<title>Pizza Kitchen</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --accent: #E8735A; --accent-dk: #C85A42;
    --text: #3D2B1F; --text-soft: #8A6E5C; --cream: #FFF8EE;
    --hud: #5C1818;
  }
  body {
    font-family: ui-rounded, "SF Pro Rounded", system-ui, sans-serif;
    background: #EDD0C8; color: var(--text);
    height: 100vh; display: flex; flex-direction: column; overflow: hidden;
  }

  /* ── HUD ── */
  .hud {
    background: var(--hud); padding: 8px 16px;
    display: flex; align-items: center; gap: 8px; flex-shrink: 0;
    border-bottom: 3px solid #3A0808; z-index: 50;
  }
  .hud-pill {
    background: rgba(0,0,0,0.35); border-radius: 20px; padding: 5px 12px;
    display: flex; align-items: center; gap: 6px;
    color: #fff; font-weight: 700; font-size: 0.85rem; white-space: nowrap;
  }
  .hud-day-wrap { display: flex; flex-direction: column; line-height: 1.1; }
  .hud-daynum { font-size: 0.6rem; opacity: 0.7; font-weight: 600; letter-spacing: 1px; }
  .hud-time { font-size: 0.95rem; font-weight: 800; }
  .hud-spacer { flex: 1; }

  /* ── SCENES ── */
  .scene { flex: 1; display: flex; flex-direction: column; overflow: hidden; min-height: 0; }
  .scene.hidden { display: none; }

  /* ── COUNTER SCENE ── */
  .cs-wrap { flex: 1; position: relative; overflow: hidden; }

  /* Brick wall — warm terracotta with horizontal mortar lines */
  .cs-wall {
    position: absolute; inset: 0 0 34% 0;
    background:
      repeating-linear-gradient(
        transparent 0px, transparent 28px,
        rgba(90,40,20,0.22) 28px, rgba(90,40,20,0.22) 32px
      ),
      repeating-linear-gradient(
        90deg,
        rgba(90,40,20,0.12) 0px, rgba(90,40,20,0.12) 2px,
        transparent 2px, transparent 60px
      ),
      linear-gradient(180deg, #B05030 0%, #C86040 40%, #B85838 100%);
  }

  /* Stone pizza oven on the right */
  .cs-oven {
    position: absolute; right: 0; top: 0; bottom: 34%;
    width: 160px;
    background: linear-gradient(160deg, #6A5040 0%, #504030 60%, #3A2820 100%);
    border-left: 6px solid #2A1810;
    z-index: 2;
  }
  .cs-oven::before {
    content: ''; position: absolute;
    top: 18%; left: 50%; transform: translateX(-50%);
    width: 100px; height: 90px;
    background: radial-gradient(ellipse at 50% 100%, #FF6010 0%, #FF3800 30%, #CC2000 55%, #1A0808 80%);
    border-radius: 50% 50% 0 0 / 60% 60% 0 0;
    box-shadow: 0 0 30px 10px rgba(255,80,10,0.5), inset 0 -10px 20px rgba(0,0,0,0.6);
  }
  .cs-oven::after {
    content: ''; position: absolute;
    top: calc(18% + 90px); left: 50%; transform: translateX(-50%);
    width: 100px; height: 14px;
    background: linear-gradient(180deg, #3A2820, #1A0C08);
    border-radius: 0 0 8px 8px;
  }
  .cs-oven-chimney {
    position: absolute; top: 0; right: 28px; width: 28px; height: 18%;
    background: linear-gradient(90deg, #7A5838, #5A3820, #7A5838);
    border-radius: 4px 4px 0 0;
  }
  .cs-oven-arch-label {
    position: absolute; top: calc(18% - 18px); left: 50%; transform: translateX(-50%);
    font-size: 0.45rem; font-weight: 900; letter-spacing: 1.5px; color: rgba(255,200,120,0.6);
    text-transform: uppercase; white-space: nowrap;
  }

  /* Hanging lamp from top-center */
  .cs-lamp {
    position: absolute; top: 0; left: 50%; transform: translateX(-50%);
    z-index: 10; display: flex; flex-direction: column; align-items: center;
  }
  .cs-lamp-cord {
    width: 3px; height: 32px;
    background: linear-gradient(180deg, #2A1A0A, #5A3820);
    border-radius: 2px;
  }
  .cs-lamp-shade {
    width: 52px; height: 34px;
    background: linear-gradient(180deg, #2A1A08 0%, #4A2810 50%, #6A3A14 100%);
    border-radius: 0 0 50% 50% / 0 0 80% 80%;
    box-shadow: 0 0 22px 10px rgba(255,200,80,0.45), inset 0 4px 10px rgba(255,180,60,0.3);
    position: relative;
  }
  .cs-lamp-shade::after {
    content: ''; position: absolute;
    bottom: -6px; left: 50%; transform: translateX(-50%);
    width: 10px; height: 10px; border-radius: 50%;
    background: radial-gradient(circle, #FFF0A0, #FFD040);
    box-shadow: 0 0 16px 8px rgba(255,210,60,0.5);
  }

  /* Wooden floor planks */
  .cs-floor {
    position: absolute; bottom: 0; left: 0; right: 0; height: 34%;
    background:
      repeating-linear-gradient(
        90deg,
        rgba(255,255,255,0.07) 0px, rgba(255,255,255,0.07) 1px,
        transparent 1px, transparent 80px,
        rgba(0,0,0,0.08) 80px, rgba(0,0,0,0.08) 82px,
        transparent 82px, transparent 160px
      ),
      repeating-linear-gradient(
        180deg,
        rgba(0,0,0,0.06) 0px, rgba(0,0,0,0.06) 1px,
        transparent 1px, transparent 18px
      ),
      linear-gradient(180deg, #C87838 0%, #A05C28 60%, #884A18 100%);
  }

  /* Thick wooden counter */
  .cs-counter {
    position: absolute; bottom: 30%; left: 0; right: 0; height: 100px;
    background:
      repeating-linear-gradient(90deg, rgba(0,0,0,0.15) 0px, rgba(0,0,0,0.15) 2px, transparent 2px, transparent 120px),
      repeating-linear-gradient(180deg, rgba(0,0,0,0.15) 0px, rgba(0,0,0,0.15) 2px, transparent 2px, transparent 100px),
      linear-gradient(180deg, rgba(255,255,255,0.06) 0%, rgba(0,0,0,0.12) 100%),
      url('wood-texture.png') left/120px 100px repeat;
    border-top: 6px solid #F5D080;
    border-bottom: 8px solid #6A3E10;
    box-shadow: 0 -4px 18px rgba(0,0,0,0.18), 0 6px 14px rgba(0,0,0,0.3);
    display: flex; align-items: flex-start; padding: 0 16px 0 180px; gap: 18px;
    z-index: 5;
  }
  .cs-register {
    width: 76px; height: 74px; background: #1E1608; border-radius: 6px 6px 0 0;
    margin-top: -18px; position: relative; flex-shrink: 0;
    box-shadow: 2px 0 8px rgba(0,0,0,0.3);
  }
  .cs-register::before { content:''; position:absolute; top:8px; left:8px; right:8px; height:26px; background:#3A2818; border-radius:3px; border:1px solid #5A3828; }
  .cs-register::after { content:''; position:absolute; bottom:0; left:8px; right:8px; height:12px; background:#0E0A04; border-radius:2px 2px 0 0; }
  .cs-counter-pizza {
    width: 72px; height: 52px;
    background:
      repeating-linear-gradient(90deg, transparent, transparent 5px, rgba(0,0,0,0.04) 5px, rgba(0,0,0,0.04) 10px),
      linear-gradient(180deg, #C89040 0%, #A07028 100%);
    border-radius: 6px 6px 0 0; margin-top: -10px; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center; font-size: 1.6rem;
    box-shadow: inset 0 2px 6px rgba(0,0,0,0.2);
  }
  .cs-jar {
    width: 30px; height: 44px; margin-top: 4px;
    background: linear-gradient(180deg, rgba(190,230,210,0.85), rgba(150,190,170,0.65));
    border: 2px solid rgba(110,150,130,0.65); border-radius: 4px 4px 7px 7px; position: relative;
    box-shadow: inset 2px 0 6px rgba(255,255,255,0.25);
  }
  .cs-jar::before { content:''; position:absolute; top:-7px; left:5px; right:5px; height:9px; background:#8AAA90; border-radius:3px 3px 0 0; }

  /* Award frames on wall */
  .cs-frame { position: absolute; top: 12px; background: #7A3828; border: 3px solid #5A2010; border-radius: 4px; box-shadow: 2px 4px 12px rgba(0,0,0,0.35); }
  .cs-frame.f1 { right: 180px; width: 68px; height: 54px; }
  .cs-frame.f2 { right: 110px; width: 52px; height: 42px; top: 10px; }
  .cs-frame.f1::before { content:'BEST'; position:absolute; top:6px; left:0; right:0; text-align:center; font-size:0.38rem; font-weight:900; letter-spacing:1px; color:rgba(255,220,140,0.85); text-transform:uppercase; }
  .cs-frame.f1::after { content:'🏆'; position:absolute; bottom:5px; left:0; right:0; text-align:center; font-size:1rem; }
  .cs-frame.f2::before { content:'🥇'; position:absolute; inset:0; display:flex; align-items:center; justify-content:center; font-size:1.1rem; }

  /* Cat decoration */
  .cs-cat { position: absolute; right: 170px; bottom: calc(30% + 97px); font-size: 2.2rem; line-height:1; filter: drop-shadow(2px 4px 6px rgba(0,0,0,0.25)); z-index:6; }

  /* Chef worker — behind counter */
  .cs-worker {
    position: absolute; left: 20px; bottom: calc(30% + 0px); width: 148px;
    filter: drop-shadow(4px 8px 14px rgba(0,0,0,0.32)); z-index: 4;
  }

  /* Customer on right side */
  .cs-customer { position: absolute; right: 180px; bottom: calc(30% + 95px); width: 88px; filter: drop-shadow(3px 6px 10px rgba(0,0,0,0.25)); transition: opacity 0.2s; z-index:6; }
  .cs-customer.kid { width: 70px; }
  .cs-name-tag {
    position: absolute; bottom: calc(30% + 88px); right: 180px;
    background: rgba(255,248,238,0.95); border: 2px solid #D4A870;
    border-radius: 14px; padding: 4px 12px;
    font-size: 0.65rem; font-weight: 800; color: var(--text-soft);
    letter-spacing: 0.5px; white-space: nowrap;
    box-shadow: 0 2px 8px rgba(0,0,0,0.15); text-align: center; min-width: 88px; z-index:7;
  }

  /* Dialogue box — left/center area */
  .cs-dialogue {
    position: absolute; top: 12px; left: 160px; right: 286px;
    display: flex; flex-direction: column; gap: 10px; z-index: 20;
  }
  .speech-bubble {
    background: #FFFDF8; border: 3.5px solid #3D2B1F; border-radius: 22px;
    padding: 14px 18px; position: relative;
    box-shadow: 4px 6px 0px rgba(61,43,31,0.25);
    animation: bubbleIn 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
  }
  .speech-bubble::after {
    content: ''; position: absolute; bottom: -18px; right: 22px;
    width: 0; height: 0;
    border-left: 14px solid transparent;
    border-right: 0px solid transparent;
    border-top: 18px solid #3D2B1F;
  }
  .speech-bubble::before {
    content: ''; position: absolute; bottom: -13px; right: 24px;
    width: 0; height: 0;
    border-left: 11px solid transparent;
    border-top: 14px solid #FFFDF8;
    z-index: 1;
  }
  @keyframes bubbleIn {
    from { transform: scale(0.88) translateY(-8px); opacity: 0; }
    to   { transform: scale(1) translateY(0); opacity: 1; }
  }
  .speech-bubble p { font-size: 0.9rem; line-height: 1.55; color: var(--text); font-weight: 600; }
  .hint-bubble { background: #F0FAF0; border: 2.5px solid #60B060; border-radius: 14px; padding: 10px 14px; animation: bubbleIn 0.2s ease; }
  .hint-bubble.hidden { display: none; }
  .hint-bubble p { font-size: 0.8rem; color: #1E6A1E; font-weight: 700; }
  .hint-label { font-size: 0.62rem; font-weight: 900; letter-spacing: 1.5px; text-transform: uppercase; color: #3A7A3A; margin-bottom: 3px; }
  .response-btns { display: flex; gap: 8px; margin-top: 2px; }
  .btn-okay, .btn-what {
    display: flex; align-items: center; gap: 7px;
    padding: 9px 16px; border-radius: 30px; font-family: inherit;
    font-size: 0.85rem; font-weight: 800; cursor: pointer;
    transition: all 0.15s; box-shadow: 3px 4px 0 rgba(61,43,31,0.2);
  }
  .btn-okay { background:#E8735A; border:2.5px solid #3D2B1F; color:#fff; flex:1.2; }
  .btn-okay:hover { background:#C85A42; transform:translateY(-2px); }
  .btn-what { background:#FFFDF8; border:2.5px solid #3D2B1F; color:var(--text); flex:1; }
  .btn-what:hover { background:#FFF0D8; transform:translateY(-2px); }
  .btn-key { display:inline-flex; align-items:center; justify-content:center; width:20px; height:20px; background:#3D2B1F; color:#FFF8EE; border-radius:50%; font-size:0.65rem; font-weight:900; flex-shrink:0; }

  /* ── KITCHEN SCENE ── */
  #kitchen-scene {
    background:
      repeating-linear-gradient(transparent 0px, transparent 28px, rgba(90,40,20,0.15) 28px, rgba(90,40,20,0.15) 32px),
      repeating-linear-gradient(90deg, rgba(90,40,20,0.08) 0px, rgba(90,40,20,0.08) 2px, transparent 2px, transparent 60px),
      linear-gradient(180deg, #B05030 0%, #C86040 50%, #A85030 100%);
  }

  /* Order receipt bar */
  .k-order-bar {
    background: #FFF9F0;
    border-bottom: 3px solid #3D2B1F;
    padding: 8px 18px;
    display: flex; align-items: center; gap: 10px; flex-wrap: wrap; flex-shrink: 0;
    position: relative;
    box-shadow: 0 3px 8px rgba(0,0,0,0.18);
  }
  .k-order-bar::after {
    content: '';
    position: absolute; bottom: -8px; left: 0; right: 0; height: 8px;
    background: repeating-linear-gradient(
      90deg,
      #FFF9F0 0px, #FFF9F0 10px,
      transparent 10px, transparent 14px
    );
  }
  .k-order-eyebrow { font-size: 0.6rem; font-weight: 900; letter-spacing: 2px; color: #8A5040; text-transform: uppercase; white-space: nowrap; }
  .k-pizza-name { font-size: 0.9rem; font-weight: 900; color: #C84A30; white-space: nowrap; }
  .k-order-divider { width: 1px; height: 22px; background: #C89870; flex-shrink: 0; }
  .k-ticket-items { display: flex; flex-wrap: wrap; gap: 5px; align-items: center; }
  .ticket-item {
    display: flex; align-items: center; gap: 4px;
    background: #FFF3E8; border: 2px solid #3D2B1F;
    border-radius: 20px; padding: 2px 8px 2px 5px;
    font-size: 0.7rem; font-weight: 700; color: var(--text); transition: all 0.18s;
    box-shadow: 2px 2px 0 rgba(61,43,31,0.15);
  }
  .ticket-item.done { background: #D8F0D8; border-color: #2A6A2A; color: #1A5A1A; }
  .ti-dot { width: 12px; height: 12px; border-radius: 50%; flex-shrink: 0; }

  .k-body { flex: 1; display: flex; min-height: 0; overflow: hidden; }

  /* Left: pizza station */
  .k-pizza-station {
    flex: 0 0 42%;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    padding: 16px 12px 16px 20px; gap: 14px;
  }

  /* Pizza peel shape — elongated oval with wooden handle suggestion */
  .k-board-wrap {
    background:
      repeating-linear-gradient(
        180deg,
        rgba(255,255,255,0.1) 0px, rgba(255,255,255,0.1) 1px,
        transparent 1px, transparent 8px
      ),
      repeating-linear-gradient(
        90deg,
        transparent 0px, transparent 12px,
        rgba(0,0,0,0.06) 12px, rgba(0,0,0,0.06) 14px
      ),
      linear-gradient(160deg, #E8C068 0%, #C89030 45%, #A06820 100%);
    border-radius: 50% / 30%;
    padding: 22px 28px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.35), inset 0 2px 0 rgba(255,255,255,0.2), 0 0 0 5px #8A5018;
    display: flex; align-items: center; justify-content: center;
    position: relative;
  }
  .k-board-wrap::after {
    content: ''; position: absolute;
    bottom: -22px; left: 50%; transform: translateX(-50%);
    width: 28px; height: 24px;
    background: linear-gradient(180deg, #8A5018, #5A3010);
    border-radius: 0 0 6px 6px;
    box-shadow: 0 4px 8px rgba(0,0,0,0.3);
  }
  #pizza-canvas {
    border-radius: 50%; display: block;
    filter: drop-shadow(0 6px 16px rgba(0,0,0,0.35));
    max-width: 100%;
  }
  .k-actions { display: flex; gap: 9px; width: 100%; }
  .k-btn-clear {
    flex: 1; padding: 11px; border: 2.5px solid #3D2B1F;
    background: #FFF9F0; color: #5A3C30;
    font-size: 0.82rem; font-weight: 800; border-radius: 12px;
    cursor: pointer; font-family: inherit; transition: all 0.15s;
    box-shadow: 3px 4px 0 rgba(61,43,31,0.2);
  }
  .k-btn-clear:hover { background:#FFE8D0; transform:translateY(-1px); }
  .k-btn-serve {
    flex: 2; padding: 11px 16px; background: #E8735A; color: #fff;
    font-size: 0.9rem; font-weight: 900; border: 2.5px solid #3D2B1F; border-radius: 12px;
    cursor: pointer; font-family: inherit;
    box-shadow: 3px 4px 0 rgba(61,43,31,0.3); transition: all 0.15s;
  }
  .k-btn-serve:hover { background: #C85A42; transform: translateY(-1px); }
  .k-btn-serve:active { transform: translateY(0); box-shadow: 1px 2px 0 rgba(61,43,31,0.3); }

  /* Right: ingredient shelf — warm wooden shelf look */
  .k-ingredient-station {
    flex: 1;
    background: linear-gradient(180deg, rgba(168,90,40,0.18) 0%, rgba(210,140,80,0.25) 100%);
    border-left: 4px solid #3D2B1F;
    padding: 10px 12px 12px 10px;
    overflow: hidden; display: flex; flex-direction: column;
    position: relative;
  }
  .k-ingredient-station::before {
    content: ''; position: absolute;
    top: 0; left: 0; right: 0; height: 6px;
    background: linear-gradient(180deg, #C88840, #A06020);
    border-bottom: 2px solid #3D2B1F;
  }
  .k-ingredient-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 7px;
    overflow-y: auto;
    flex: 1;
    align-content: start;
    margin-top: 4px;
  }

  /* Ingredient cards — bowl/plate style */
  .ing-card {
    background: linear-gradient(160deg, #FFF5EC, #F0E0CC);
    border: 2.5px solid #3D2B1F;
    border-radius: 12px;
    overflow: hidden; cursor: pointer;
    display: flex; flex-direction: column;
    transition: transform 0.12s, box-shadow 0.15s;
    user-select: none;
    box-shadow: 3px 4px 0 rgba(61,43,31,0.25);
  }
  .ing-card:hover { transform: translateY(-3px) scale(1.03); box-shadow: 4px 6px 0 rgba(61,43,31,0.3); }
  .ing-card:active { transform: translateY(0) scale(1); box-shadow: 1px 2px 0 rgba(61,43,31,0.25); }
  .ing-card.selected {
    border-color: #E8735A;
    box-shadow: 3px 4px 0 rgba(232,115,90,0.5), 0 0 0 3px rgba(232,115,90,0.2);
    background: linear-gradient(160deg, #FFF0E8, #FFE0CC);
  }
  .ing-texture { flex: 1; min-height: 52px; position: relative; border-radius: 8px 8px 0 0; overflow: hidden; }
  .ing-check {
    position: absolute; top: 4px; right: 4px; width: 18px; height: 18px;
    background: #E8735A; border: 2px solid #3D2B1F; border-radius: 50%;
    display: none; align-items: center; justify-content: center;
    color: #fff; font-size: 9px; font-weight: 900;
    box-shadow: 1px 2px 0 rgba(61,43,31,0.3);
  }
  .ing-card.selected .ing-check { display: flex; }
  .ing-label {
    padding: 4px 3px 5px; font-size: 0.58rem; font-weight: 800;
    text-align: center; color: #3D2B1F; line-height: 1.2;
    background: rgba(255,245,235,0.98); border-top: 2px solid #3D2B1F;
  }

  /* Ingredient textures */
  .tex-sauce     { background:radial-gradient(circle at 22% 38%,rgba(255,255,255,0.12) 18px,transparent 18px),radial-gradient(circle at 72% 65%,rgba(255,255,255,0.08) 12px,transparent 12px),linear-gradient(145deg,#D44030,#B02818); }
  .tex-cheese    { background:radial-gradient(ellipse 28px 18px at 25% 45%,rgba(255,255,255,0.55),transparent),radial-gradient(ellipse 22px 14px at 70% 60%,rgba(255,255,255,0.45),transparent),linear-gradient(145deg,#F0D060,#D8B840); }
  .tex-pepperoni { background:radial-gradient(circle 14px at 28% 42%,#8A1A28 40%,transparent 40%),radial-gradient(circle 14px at 70% 35%,#8A1A28 40%,transparent 40%),linear-gradient(145deg,#AE2035,#8A1520); }
  .tex-mushroom  { background:radial-gradient(ellipse 20px 10px at 30% 55%,rgba(0,0,0,0.15),transparent),radial-gradient(ellipse 16px 8px at 68% 50%,rgba(0,0,0,0.12),transparent),linear-gradient(145deg,#B09070,#8A6E52); }
  .tex-olive     { background:radial-gradient(circle 12px at 28% 45%,rgba(100,80,20,0.4) 40%,transparent 40%),radial-gradient(circle 12px at 68% 38%,rgba(100,80,20,0.4) 40%,transparent 40%),linear-gradient(145deg,#3A3020,#201A10); }
  .tex-pepper    { background:repeating-linear-gradient(-45deg,rgba(255,255,255,0.12) 0px,rgba(255,255,255,0.12) 4px,transparent 4px,transparent 12px),linear-gradient(145deg,#3ABF5A,#1E8E38); }
  .tex-onion     { background:repeating-linear-gradient(20deg,rgba(255,255,255,0.12) 0px,rgba(255,255,255,0.12) 3px,transparent 3px,transparent 10px),linear-gradient(145deg,#9B52C0,#6B2890); }
  .tex-basil     { background:radial-gradient(ellipse 24px 14px at 30% 50%,rgba(255,255,255,0.2),transparent),radial-gradient(ellipse 20px 12px at 68% 45%,rgba(255,255,255,0.15),transparent),linear-gradient(145deg,#30B050,#18782E); }
  .tex-sausage   { background:radial-gradient(circle 13px at 28% 42%,#5A2010 40%,transparent 40%),radial-gradient(circle 13px at 70% 60%,#5A2010 40%,transparent 40%),linear-gradient(145deg,#8B4428,#6B3018); }
  .tex-bacon     { background:repeating-linear-gradient(0deg,#D84848 0,#D84848 5px,#F4A090 5px,#F4A090 10px,#C83030 10px,#C83030 14px,#F4A090 14px,#F4A090 19px); }

function seededRand(seed) { let s=seed; return ()=>{s=(s*16807)%2147483647;return(s-1)/2147483646;}; }

const canvas = document.getElementById('pizza-canvas');
const ctx = canvas.getContext('2d');
const CX=110, CY=110, R=100;

function drawPizza() {
  ctx.clearRect(0,0,220,220);
  const a=state.added;
  ctx.save(); ctx.shadowColor='rgba(0,0,0,0.22)'; ctx.shadowBlur=16; ctx.shadowOffsetY=5;

  ctx.beginPath(); ctx.arc(CX,CY,R-13,0,Math.PI*2); ctx.fillStyle='#EEC858'; ctx.fill();
  const dt=seededRand(9); for(let i=0;i<16;i++){const ang=dt()*Math.PI*2,d=(R-4)-dt()*8;ctx.beginPath();ctx.arc(CX+Math.cos(ang)*d,CY+Math.sin(ang)*d,1.5+dt()*2,0,Math.PI*2);ctx.fillStyle='rgba(150,80,15,0.18)';ctx.fill();}
  if(a.has('sauce')){ctx.beginPath();ctx.arc(CX,CY,R-15,0,Math.PI*2);ctx.fillStyle='#C03020';ctx.fill();const sr=seededRand(55);for(let i=0;i<10;i++){const ang=sr()*Math.PI*2,d=sr()*(R-18);ctx.beginPath();ctx.arc(CX+Math.cos(ang)*d,CY+Math.sin(ang)*d,3+sr()*5,0,Math.PI*2);ctx.fillStyle='rgba(150,15,10,0.2)';ctx.fill();}}
  if(a.has('cheese')){const cr=seededRand(42);ctx.fillStyle='#F5E090';for(let i=0;i<20;i++){const ang=cr()*Math.PI*2,d=cr()*(R-17),rx=7+cr()*17,ry=5+cr()*11;ctx.save();ctx.translate(CX+Math.cos(ang)*d,CY+Math.sin(ang)*d);ctx.rotate(cr()*Math.PI);ctx.beginPath();ctx.ellipse(0,0,rx,ry,0,0,Math.PI*2);ctx.fill();ctx.restore();}}
  if(a.has('pepperoni')){const pr=seededRand(123);for(let i=0;i<9;i++){const ang=pr()*Math.PI*2,d=pr()*(R-26),px=CX+Math.cos(ang)*d,py=CY+Math.sin(ang)*d;ctx.beginPath();ctx.arc(px,py,12,0,Math.PI*2);ctx.fillStyle='#9B2335';ctx.fill();ctx.beginPath();ctx.arc(px,py,7,0,Math.PI*2);ctx.fillStyle='#7A1A28';ctx.fill();const s2=seededRand(pr()*999+i);for(let j=0;j<4;j++){const sa=s2()*Math.PI*2,sd=s2()*8;ctx.beginPath();ctx.arc(px+Math.cos(sa)*sd,py+Math.sin(sa)*sd,1.4,0,Math.PI*2);ctx.fillStyle='#501015';ctx.fill();}}}
  if(a.has('mushroom')){const mr=seededRand(77);for(let i=0;i<8;i++){const ang=mr()*Math.PI*2,d=mr()*(R-24),mx=CX+Math.cos(ang)*d,my=CY+Math.sin(ang)*d;ctx.save();ctx.translate(mx,my);ctx.rotate(mr()*Math.PI);ctx.beginPath();ctx.ellipse(0,-4,10,7,0,Math.PI,Math.PI*2);ctx.fillStyle='#9E7A55';ctx.fill();ctx.fillRect(-3,-4,6,9);ctx.beginPath();ctx.ellipse(0,-4,10,7,0,Math.PI,Math.PI*2);ctx.fillStyle='#BA9065';ctx.fill();ctx.restore();}}
  if(a.has('olive')){const or=seededRand(200);for(let i=0;i<9;i++){const ang=or()*Math.PI*2,d=or()*(R-24),ox=CX+Math.cos(ang)*d,oy=CY+Math.sin(ang)*d;ctx.beginPath();ctx.arc(ox,oy,8,0,Math.PI*2);ctx.fillStyle='#2A2010';ctx.fill();ctx.beginPath();ctx.arc(ox,oy,4,0,Math.PI*2);ctx.fillStyle='#5A4828';ctx.fill();}}
  if(a.has('pepper')){const gr=seededRand(300);for(let i=0;i<13;i++){const ang=gr()*Math.PI*2,d=gr()*(R-22),gx=CX+Math.cos(ang)*d,gy=CY+Math.sin(ang)*d;ctx.save();ctx.translate(gx,gy);ctx.rotate(gr()*Math.PI);ctx.fillStyle='#2E9E48';ctx.beginPath();ctx.roundRect(-7,-2.5,14,5,2);ctx.fill();ctx.restore();}}
  if(a.has('onion')){const nr=seededRand(400);for(let i=0;i<11;i++){const ang=nr()*Math.PI*2,d=nr()*(R-22),nx=CX+Math.cos(ang)*d,ny=CY+Math.sin(ang)*d;ctx.save();ctx.translate(nx,ny);ctx.rotate(nr()*Math.PI);ctx.beginPath();ctx.ellipse(0,0,9,4.5,0,0,Math.PI);ctx.strokeStyle='#9B52C0';ctx.lineWidth=2.5;ctx.stroke();ctx.beginPath();ctx.ellipse(0,0,6,3,0,0,Math.PI);ctx.strokeStyle='#C070E0';ctx.lineWidth=1.5;ctx.stroke();ctx.restore();}}
  if(a.has('basil')){const br=seededRand(500);for(let i=0;i<7;i++){const ang=br()*Math.PI*2,d=br()*(R-22),bx=CX+Math.cos(ang)*d,by=CY+Math.sin(ang)*d;ctx.save();ctx.translate(bx,by);ctx.rotate(br()*Math.PI*2);ctx.beginPath();ctx.ellipse(0,0,11,6,0,0,Math.PI*2);ctx.fillStyle='#22A040';ctx.fill();ctx.beginPath();ctx.moveTo(-11,0);ctx.bezierCurveTo(-5,-5,5,-5,11,0);ctx.strokeStyle='#186030';ctx.lineWidth=1.4;ctx.stroke();ctx.restore();}}
  if(a.has('sausage')){const sr=seededRand(800);for(let i=0;i<8;i++){const ang=sr()*Math.PI*2,d=sr()*(R-26),sx=CX+Math.cos(ang)*d,sy=CY+Math.sin(ang)*d;ctx.beginPath();ctx.arc(sx,sy,14,0,Math.PI*2);ctx.fillStyle='#8B4428';ctx.fill();ctx.beginPath();ctx.arc(sx,sy,9,0,Math.PI*2);ctx.fillStyle='#6B3018';ctx.fill();ctx.strokeStyle='#5A2510';ctx.lineWidth=1;ctx.beginPath();ctx.arc(sx,sy,11,0.3,1.2);ctx.stroke();ctx.beginPath();ctx.arc(sx,sy,11,3.5,4.4);ctx.stroke();}}
  if(a.has('bacon')){const br=seededRand(900);for(let i=0;i<8;i++){const ang=br()*Math.PI*2,d=br()*(R-24),bx=CX+Math.cos(ang)*d,by=CY+Math.sin(ang)*d;ctx.save();ctx.translate(bx,by);ctx.rotate(br()*Math.PI);ctx.fillStyle='#E86868';ctx.fillRect(-16,-4,32,8);ctx.fillStyle='#F4A090';ctx.fillRect(-16,-1.5,32,3);ctx.fillStyle='#D84848';ctx.fillRect(-16,-4,32,2.5);ctx.restore();}}

  if(a.has('anchovy')){const ar=seededRand(1000);for(let i=0;i<10;i++){const ang=ar()*Math.PI*2,d=ar()*(R-24),ax=CX+Math.cos(ang)*d,ay=CY+Math.sin(ang)*d;ctx.save();ctx.translate(ax,ay);ctx.rotate(ar()*Math.PI);ctx.strokeStyle='#2A1808';ctx.lineWidth=3.5;ctx.lineCap='round';ctx.beginPath();ctx.moveTo(-13,0);ctx.bezierCurveTo(-6,-7,6,-7,13,0);ctx.stroke();ctx.strokeStyle='#4A2818';ctx.lineWidth=1.5;ctx.beginPath();ctx.moveTo(-13,0);ctx.bezierCurveTo(-6,-4,6,-4,13,0);ctx.stroke();ctx.restore();}}

  if(a.has('chicken')){const chr=seededRand(1300);for(let i=0;i<9;i++){const ang=chr()*Math.PI*2,d=chr()*(R-24),chx=CX+Math.cos(ang)*d,chy=CY+Math.sin(ang)*d;ctx.beginPath();ctx.ellipse(chx,chy,10+chr()*8,6+chr()*5,chr()*Math.PI,0,Math.PI*2);ctx.fillStyle='#E8C880';ctx.fill();ctx.beginPath();ctx.ellipse(chx,chy,7+chr()*5,4+chr()*3,chr()*Math.PI,0,Math.PI*2);ctx.fillStyle='#D0A040';ctx.fill();}}
  if(a.has('pineapple')){const pnr=seededRand(600);for(let i=0;i<10;i++){const ang=pnr()*Math.PI*2,d=pnr()*(R-22),px=CX+Math.cos(ang)*d,py=CY+Math.sin(ang)*d;ctx.save();ctx.translate(px,py);ctx.rotate(pnr()*Math.PI);ctx.beginPath();ctx.moveTo(0,-12);ctx.lineTo(10,7);ctx.lineTo(-10,7);ctx.closePath();ctx.fillStyle='#F0C020';ctx.fill();ctx.beginPath();ctx.moveTo(0,-7);ctx.lineTo(6,5);ctx.lineTo(-6,5);ctx.closePath();ctx.fillStyle='#D8A810';ctx.fill();ctx.strokeStyle='#C09000';ctx.lineWidth=0.8;ctx.beginPath();ctx.moveTo(0,-7);ctx.lineTo(0,5);ctx.stroke();ctx.restore();}}
  if(a.has('corn')){const cnr=seededRand(700);for(let i=0;i<9;i++){const ang=cnr()*Math.PI*2,d=cnr()*(R-22),knx=CX+Math.cos(ang)*d,kny=CY+Math.sin(ang)*d;ctx.save();ctx.translate(knx,kny);ctx.rotate(cnr()*Math.PI);for(let row=0;row<3;row++){for(let col=0;col<4;col++){ctx.beginPath();ctx.ellipse(-7+col*5,-5+row*5,2.2,2.8,0,0,Math.PI*2);ctx.fillStyle='#F0C820';ctx.fill();ctx.strokeStyle='#C09810';ctx.lineWidth=0.5;ctx.stroke();}}ctx.restore();}}
  if(a.has('eggplant')){const er=seededRand(1400);for(let i=0;i<8;i++){const ang=er()*Math.PI*2,d=er()*(R-22),ex=CX+Math.cos(ang)*d,ey=CY+Math.sin(ang)*d;ctx.save();ctx.translate(ex,ey);ctx.rotate(er()*Math.PI);ctx.beginPath();ctx.ellipse(0,0,10,14,0,0,Math.PI*2);ctx.fillStyle='#5A1888';ctx.fill();ctx.beginPath();ctx.ellipse(0,0,7,10,0,0,Math.PI*2);ctx.fillStyle='#7A28A8';ctx.fill();ctx.beginPath();ctx.ellipse(0,0,3,5,0,0,Math.PI*2);ctx.fillStyle='#F0EEF8';ctx.fill();ctx.restore();}}
}

function showCounterScene() {
  const c=CUSTOMERS[state.customerIdx];
  const availableToppings=INGREDIENTS.filter(i=>c.order.toppings.includes(i.id)&&state.unlocked.has(i.id)&&!i.isBase);
  const availableNames=availableToppings.map(i=>i.name);
  const dialogue=availableNames.length>0
    ? `I'd like a ${c.order.pizzaName}! ${availableNames.length===1?availableNames[0]:availableNames.slice(0,-1).join(', ')+' and '+availableNames[availableNames.length-1]}. Please!`
    : `Just a plain pizza base for me today, please!`;
  document.getElementById('customer-text').textContent=dialogue;
  document.getElementById('hint-text').textContent=availableNames.join(', ');
  document.getElementById('hint-bubble').classList.add('hidden');
  const custEl=document.getElementById('cs-customer');
  custEl.innerHTML=c.svg; custEl.className='cs-customer'+(c.isKid?' kid':'');
  document.getElementById('cs-name-tag').textContent=c.name;
  const bubble=document.getElementById('speech-bubble');
  bubble.style.animation='none'; void bubble.offsetWidth; bubble.style.animation='';
  document.getElementById('counter-scene').classList.remove('hidden');
  document.getElementById('kitchen-scene').classList.add('hidden');
  document.getElementById('feedback-overlay').classList.add('hidden');
}

function showHint() { document.getElementById('hint-bubble').classList.remove('hidden'); }

function showShop() {
  document.getElementById('shop-balance').textContent=state.money.toFixed(2);
  renderShop();
  document.getElementById('shop-overlay').classList.remove('hidden');
}
function closeShop() {
  document.getElementById('shop-overlay').classList.add('hidden');
  if(!document.getElementById('kitchen-scene').classList.contains('hidden')) {
    renderIngredients(); renderTicket();
  }
}
function renderShop() {
  const grid=document.getElementById('shop-grid');
  grid.innerHTML='';
  function header(txt, cls){ const h=document.createElement('div'); h.className='shop-section-header '+cls; h.textContent=txt; grid.appendChild(h); }
  function card(ing){
    const owned=state.unlocked.has(ing.id);
    const div=document.createElement('div');
    if(ing.ch==='pass'){
      div.className='shop-item pass-locked';
      div.innerHTML=`<div class="shop-tex ${ing.tex}" style="opacity:0.55;filter:grayscale(0.3)"></div><div class="shop-name">${ing.name}</div><div class="shop-type-tag">${ing.pass}</div><button class="btn-buy cant" disabled>🎫 Pass</button>`;
    } else if(ing.ch==='temp'){
      div.className='shop-item temp-locked';
      div.innerHTML=`<div class="shop-tex ${ing.tex}" style="opacity:0.55;filter:grayscale(0.3)"></div><div class="shop-name">${ing.name}</div><div class="shop-type-tag">${ing.event}</div><button class="btn-buy cant" disabled>⏳ Event</button>`;
    } else {
      const locked=ing.ch>state.chapter;
      const dollarCost=ing.cashCost/10;
      const can=!owned&&!locked&&state.money>=dollarCost;
      if(locked){
        div.className='shop-item';
        div.innerHTML=`<div class="shop-tex ${ing.tex}" style="opacity:0.35;filter:grayscale(0.8)"></div><div class="shop-name">${ing.name}</div><div class="shop-type-tag">${ing.type}</div><button class="btn-buy cant" disabled>Ch.${ing.ch} 🔒</button>`;
      } else {
        div.className='shop-item'+(owned?' owned':'');
        const cls=owned?'got':can?'can':'cant';
        const label=owned?'✓ Owned':`🪙 ${ing.cashCost}`;
        div.innerHTML=`<div class="shop-tex ${ing.tex}"></div><div class="shop-name">${ing.name}</div><div class="shop-type-tag">${ing.type}</div><button class="btn-buy ${cls}" ${owned||!can?'disabled':''} onclick="buyIngredient('${ing.id}')">${label}</button>`;
      }
    }
    grid.appendChild(div);
  }
  const chItems=INGREDIENTS.filter(i=>typeof i.ch==='number'&&!i.isBase&&i.cashCost>0);
  if(chItems.length){ header('📦 Ingredients','ch'); chItems.forEach(card); }
  const passItems=INGREDIENTS.filter(i=>i.ch==='pass');
  if(passItems.length){ header('🎫 Pizza Pass','pass'); passItems.forEach(card); }
  const tempItems=INGREDIENTS.filter(i=>i.ch==='temp');
  if(tempItems.length){ header('⏳ Limited Time','temp'); tempItems.forEach(card); }

  header('🔧 Upgrades','upg');
  for(const upg of UPGRADES){
    const owned=state.upgrades.has(upg.id);
    const locked=upg.ch&&upg.ch>state.chapter;
    const can=!owned&&!locked&&state.money>=upg.cost;
    const div=document.createElement('div');
    div.className='upgrade-card'+(owned?' owned':'');
    const btnLabel=owned?'✓ Owned':locked?`Ch.${upg.ch} 🔒`:'$'+upg.cost;
    const btnCls=owned?'got':locked?'cant':can?'can':'cant';
    div.innerHTML=`<div class="upg-icon">${upg.icon}</div><div class="upg-info"><div class="upg-name">${upg.name}</div><div class="upg-desc">${upg.desc}</div></div><button class="btn-buy-upg ${btnCls}" ${owned||!can?'disabled':''} onclick="buyUpgrade('${upg.id}')">${btnLabel}</button>`;
    grid.appendChild(div);
  }
}
function buyUpgrade(id) {
  const upg=UPGRADES.find(u=>u.id===id);
  if(!upg||state.upgrades.has(id)||state.money<upg.cost) return;
  state.money-=upg.cost;
  state.upgrades.add(id);
  document.getElementById('hud-money').textContent=state.money.toFixed(2);
  document.getElementById('shop-balance').textContent=state.money.toFixed(2);
  if(id==='zazoom') document.getElementById('zazoom-poster').classList.add('visible');
  renderShop();
}

function buyIngredient(id) {
  const ing=INGREDIENTS.find(i=>i.id===id);
  if(!ing||!ing.cashCost||state.unlocked.has(id)||ing.ch>state.chapter) return;
  const dollarCost=ing.cashCost/10;
  if(state.money<dollarCost) return;
  state.money-=dollarCost;
  state.unlocked.add(id);
  document.getElementById('hud-money').textContent=state.money.toFixed(2);
  document.getElementById('shop-balance').textContent=state.money.toFixed(2);
  renderShop();
}

function goToKitchen() {
  const c=CUSTOMERS[state.customerIdx];
  state.order=c.order.toppings.filter(id=>state.unlocked.has(id)&&!(ING_MAP[id]&&ING_MAP[id].isBase)); state.pizzaName=c.order.pizzaName;
  state.added.clear(); state.served=false;
  document.getElementById('counter-scene').classList.add('hidden');
  document.getElementById('kitchen-scene').classList.remove('hidden');
  renderIngredients(); renderTicket(); drawPizza();
}

function renderIngredients() {
  const panel=document.getElementById('ingredients-panel');
  panel.innerHTML='';
  if(state.upgrades.has('widecounter')) panel.classList.add('wide'); else panel.classList.remove('wide');
  for(const ing of INGREDIENTS.filter(i=>state.unlocked.has(i.id)&&!i.isBase)){
    const card=document.createElement('div');
    card.className='ing-card'+(state.added.has(ing.id)?' selected':'');
    card.innerHTML=`<div class="ing-texture ${ing.tex}"><div class="ing-check">✓</div></div><div class="ing-label">${ing.name}</div>`;
    card.addEventListener('click',()=>toggleIngredient(ing.id));
    panel.appendChild(card);
  }
}

function undoLastTopping() {
  if(!state.upgrades.has('undo')||state.added.size===0) return;
  const last=[...state.added].pop();
  state.added.delete(last);
  renderIngredients(); renderTicket(); drawPizza();
}

function renderTicket() {
  document.getElementById('ticket-pizza-name').textContent=state.pizzaName||'';
  const container=document.getElementById('ticket-items');
  container.innerHTML='';
  for(const id of state.order){
    const ing=INGREDIENTS.find(i=>i.id===id);
    const item=document.createElement('div');
    const locked=!state.unlocked.has(id);
    item.className='ticket-item'+(state.added.has(id)?' done':'')+(locked?' locked':'');
    item.innerHTML=`<div class="ti-dot" style="background:${ing.dot}"></div>${ing.name}${locked?' 🔒':''}`;
    container.appendChild(item);
  }
}

function toggleIngredient(id) {
  if(state.served) return;
  if(state.added.has(id)) state.added.delete(id); else state.added.add(id);
  renderIngredients(); renderTicket(); drawPizza();
}

function clearPizza() {
  if(state.served) return;
  state.added.clear(); renderIngredients(); renderTicket(); drawPizza();
}

function servePizza() {
  if(state.served) return;
  state.served=true;
  const order=new Set(state.order);
  let correct=0,missing=0,extra=0;
  for(const id of order){if(state.added.has(id)) correct++; else missing++;}
  for(const id of state.added){if(!order.has(id)) extra++;}
  const maxPts=order.size*10;
  const pts=Math.max(0,correct*10-missing*5-extra*5);
  state.score+=pts;
  const pct=pts/maxPts;
  const customer=CUSTOMERS[state.customerIdx];
  let earned=pct>=1?customer.money:pct>=0.6?customer.money*0.7:customer.money*0.3;
  if(state.upgrades.has('tipjar')) earned+=1;
  if(pct>=1 && state.upgrades.has('ovenbooster')) earned*=1.2;
  if(state.upgrades.has('pizzawarmer')) earned*=1.15;
  for(const id of state.added){ state.ingredientSales[id]=(state.ingredientSales[id]||0)+1; }
  state.money+=earned;
  const mood=Math.max(0,parseInt(document.getElementById('hud-mood').textContent)-(missing+extra)*7);
  document.getElementById('hud-mood').textContent=mood+'%';
  document.getElementById('hud-coins').textContent=state.customerIdx+1;
  document.getElementById('hud-money').textContent=state.money.toFixed(2);
  const emoji=pct===1?'⭐':pct>=0.6?'😊':pct>0?'😐':'😬';
  const title=pct===1?'Perfect!':pct>=0.6?'Pretty good!':pct>0?'Hmm...':'Wrong order!';
  const sub=pct===1?'Exactly what they wanted!':pct>=0.6?`${customer.name} seems okay with it.`:pct>0?'They ate it... reluctantly.':'Sent it straight back.';
  const stars=pct===1?'★★★':pct>=0.6?'★★☆':pct>0?'★☆☆':'☆☆☆';
  const isLast=state.customerIdx>=state.totalRounds-1;
  let details=[];
  if(missing>0) details.push(`Missing: ${missing} topping${missing>1?'s':''}`);
  if(extra>0) details.push(`Extra: ${extra} topping${extra>1?'s':''}`);
  document.getElementById('feedback-card').innerHTML=`
    <div class="fb-emoji">${emoji}</div>
    <div class="fb-stars">${stars}</div>
    <div class="fb-title">${title}</div>
    <div class="fb-sub">${sub}</div>
    <div class="fb-pts">+$${earned.toFixed(2)}</div>
    ${details.length?`<div class="fb-detail">${details.join(' · ')}</div>`:''}
    ${!isLast?`<button class="btn-shop-fb" onclick="showShop()">🛒 Visit Shop</button>`:''}
    <button class="btn-next" onclick="${isLast?'showGameOver()':'nextCustomer()'}">
      ${isLast?'Close Up Shop':'Next Customer →'}
    </button>`;
  document.getElementById('feedback-overlay').classList.remove('hidden');
}

function nextCustomer() {
  state.customerIdx++;
  document.getElementById('hud-day').textContent=state.customerIdx+1;
  showCounterScene();
}

function showGameOver() {
  const maxMoney=CUSTOMERS.reduce((s,c)=>s+c.money,0);
  const pct=state.money/maxMoney;
  const stars=pct>=0.85?'★★★':pct>=0.55?'★★☆':'★☆☆';
  const msg=pct>=0.85?'You run a tight kitchen!':pct>=0.55?'A solid day of work.':'Room to improve.';
  document.getElementById('feedback-card').innerHTML=`
    <div class="fb-emoji">🍕</div>
    <div class="fb-stars" style="font-size:2rem">${stars}</div>
    <div class="fb-title">Kitchen Closed!</div>
    <div class="fb-sub">${msg}</div>
    <div class="fb-pts">$${state.money.toFixed(2)} earned</div>
    <div class="fb-detail">Served all ${state.totalRounds} customers today.</div>
    <button class="btn-next" onclick="restartGame()">Open Tomorrow →</button>`;
}

function restartGame() {
  state.added.clear(); state.score=0; state.money=0;
  state.customerIdx=0; state.served=false; state.pizzaName='';
  state.unlocked=new Set(BASIC_ING); state.chapter=1; state.upgrades=new Set(); state.ingredientSales={};
  document.getElementById('zazoom-poster').classList.remove('visible');
  document.getElementById('hud-day').textContent='1';
  document.getElementById('hud-mood').textContent='100%';
  document.getElementById('hud-coins').textContent='0';
  document.getElementById('hud-money').textContent='0.00';
  showCounterScene();
}

// ── Pizzaria Protector ──────────────────────────────────────────────────────
let protectorTimer=null, protectorHP=100, protectorEnemyInterval=null;

function openProtector() {
  protectorHP=100;
  const overlay=document.getElementById('protector-overlay');
  overlay.classList.remove('hidden');
  document.getElementById('p-result').classList.add('hidden');
  document.getElementById('p-hp-fill').style.width='100%';
  document.getElementById('p-hp-fill').style.background='#4CAF50';
  document.getElementById('p-arena').querySelectorAll('.p-enemy').forEach(e=>e.remove());
  startProtector();
}

function startProtector() {
  let timeLeft=30;
  document.getElementById('p-timer').textContent=timeLeft;
  protectorEnemyInterval=setInterval(spawnEnemy,1800);
  protectorTimer=setInterval(()=>{
    timeLeft--;
    document.getElementById('p-timer').textContent=timeLeft;
    if(timeLeft<=0 || protectorHP<=0){ endProtector(protectorHP>0); }
  },1000);
}

function spawnEnemy() {
  const arena=document.getElementById('p-arena');
  const enemy=document.createElement('div');
  const types=[{e:'🍕',hp:1},{e:'😤',hp:2},{e:'🍕😤',hp:3}];
  const t=types[Math.floor(Math.random()*types.length)];
  enemy.className='p-enemy';
  enemy.textContent=t.e;
  enemy.dataset.hp=t.hp;
  enemy.style.top=Math.floor(20+Math.random()*55)+'%';
  enemy.style.animationDuration=(4+Math.random()*3).toFixed(1)+'s';
  enemy.addEventListener('animationend',()=>{
    if(!enemy.dataset.defeated){
      protectorHP=Math.max(0,protectorHP-20);
      updateHP();
      enemy.remove();
      if(protectorHP<=0) endProtector(false);
    }
  });
  enemy.addEventListener('click',()=>{
    let h=parseInt(enemy.dataset.hp)-1;
    enemy.dataset.hp=h;
    showHit(enemy,'+1');
    if(h<=0){
      enemy.dataset.defeated='1';
      enemy.classList.add('p-defeated');
      setTimeout(()=>enemy.remove(),300);
    }
  });
  arena.appendChild(enemy);
}

function showHit(el, txt) {
  const span=document.createElement('span');
  span.className='p-hit-text'; span.textContent=txt;
  el.appendChild(span);
  setTimeout(()=>span.remove(),700);
}

function updateHP() {
  const fill=document.getElementById('p-hp-fill');
  fill.style.width=protectorHP+'%';
  fill.style.background=protectorHP>50?'#4CAF50':protectorHP>25?'#FF9800':'#f44336';
}

function endProtector(won) {
  clearInterval(protectorTimer); clearInterval(protectorEnemyInterval);
  document.getElementById('p-arena').querySelectorAll('.p-enemy').forEach(e=>e.remove());
  const result=document.getElementById('p-result');
  const reward=won?8:0;
  if(reward>0){ state.money+=reward; document.getElementById('hud-money').textContent=state.money.toFixed(2); }
  document.getElementById('p-res-icon').textContent=won?'🏆':'💥';
  document.getElementById('p-res-title').textContent=won?'Restaurant Defended!':'The Deep Dish Won...';
  document.getElementById('p-res-sub').textContent=won?'You repelled the Deep Dish Gang!':'They trashed the place. Better luck next time.';
  document.getElementById('p-res-money').textContent=won?'+$8.00 reward!':'No reward this time.';
  result.classList.remove('hidden');
}

function closeProtector() {
  document.getElementById('protector-overlay').classList.add('hidden');
}

showCounterScene();
document.addEventListener('keydown', e => {
  if(document.getElementById('counter-scene').classList.contains('hidden')) return;
  if(e.key==='a'||e.key==='A'||e.key==='Enter') goToKitchen();
  if(e.key==='b'||e.key==='B') showHint();
  if(e.key==='s'||e.key==='S') showShop();
});
</script>
